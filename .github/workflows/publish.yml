name: Release

# Native-only release (1.7.6+). Cross-compiles the five native binaries (with the
# Trunk viewer dist embedded via rust-embed), then attaches them plus a
# SHA256SUMS manifest to the GitHub release. The shell installer (install.sh) and
# `architext update` download these directly — there is no npm channel.
#
# dry_run=true builds everything (binaries + viewer) without attaching anything to
# a release — run it before tagging to validate the build.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version to build, without the leading v.
        required: false
        type: string
      dry_run:
        description: Build without attaching binaries to a release.
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write # attach native binaries + checksums to the GitHub release

jobs:
  resolve:
    name: resolve version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.r.outputs.tag }}
      version: ${{ steps.r.outputs.version }}
      dry_run: ${{ steps.r.outputs.dry_run }}
      ref: ${{ steps.r.outputs.ref }}
    steps:
      - name: Resolve tag / version / ref
        id: r
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
            dry_run="false"
            ref="$tag"
          else
            tag="v${{ inputs.version }}"
            dry_run="${{ inputs.dry_run }}"
            ref="${{ github.ref }}"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must be vX.Y.Z; got $tag" >&2
            exit 1
          fi
          {
            echo "tag=$tag"
            echo "version=${tag#v}"
            echo "dry_run=$dry_run"
            echo "ref=$ref"
          } >> "$GITHUB_OUTPUT"

      - name: Confirm VERSION matches the released version
        if: ${{ github.event_name == 'release' }}
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.r.outputs.ref }}
      - name: Check VERSION file
        if: ${{ github.event_name == 'release' }}
        shell: bash
        run: |
          set -euo pipefail
          actual="$(tr -d '[:space:]' < VERSION)"
          if [ "$actual" != "${{ steps.r.outputs.version }}" ]; then
            echo "VERSION file ($actual) != released version (${{ steps.r.outputs.version }})" >&2
            exit 1
          fi

  # The viewer dist is EMBEDDED into the binary (rust-embed in architext-serve), so it
  # must exist before the CLI compiles. Build it once here and feed it to build-binaries.
  build-viewer:
    name: viewer dist (trunk)
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - name: Check out the release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Build the viewer dist
        run: trunk build --release --config crates/architext-viewer/Trunk.toml

      - name: Upload viewer dist artifact
        uses: actions/upload-artifact@v5
        with:
          name: architext-viewer-dist
          path: crates/architext-viewer/dist
          if-no-files-found: error

  build-binaries:
    name: binary ${{ matrix.target_key }}
    needs: [resolve, build-viewer]
    runs-on: ${{ matrix.runner }}
    # Attach nothing unless ALL five binaries build — a partial set would leave the
    # installer unable to fetch some platforms.
    strategy:
      fail-fast: true
      matrix:
        include:
          - target_key: darwin-arm64
            runner: macos-14
            rust_target: aarch64-apple-darwin
            cross: false
            bin: architext
          - target_key: darwin-x64
            runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            cross: false
            bin: architext
          - target_key: linux-x64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            cross: false
            bin: architext
          - target_key: linux-arm64
            runner: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            cross: true
            bin: architext
          - target_key: win32-x64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            cross: false
            bin: architext.exe

    steps:
      - name: Check out the release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install cross
        if: ${{ matrix.cross }}
        run: cargo install cross --locked

      # Place the Trunk-built viewer dist where rust-embed bakes it into the binary.
      - name: Download viewer dist (for embedding)
        uses: actions/download-artifact@v5
        with:
          name: architext-viewer-dist
          path: crates/architext-viewer/dist

      - name: Verify viewer dist present before embedding
        shell: bash
        run: test -f crates/architext-viewer/dist/index.html

      - name: Build native CLI (cargo)
        if: ${{ !matrix.cross }}
        run: cargo build --release -p architext-cli --target ${{ matrix.rust_target }}

      - name: Build native CLI (cross)
        if: ${{ matrix.cross }}
        run: cross build --release -p architext-cli --target ${{ matrix.rust_target }}

      - name: Stage binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p staged
          cp "target/${{ matrix.rust_target }}/release/${{ matrix.bin }}" "staged/${{ matrix.bin }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v5
        with:
          name: architext-binary-${{ matrix.target_key }}
          path: staged/${{ matrix.bin }}
          if-no-files-found: error

  release:
    name: attach binaries to release
    needs: [resolve, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Download per-platform binaries
        uses: actions/download-artifact@v5
        with:
          pattern: architext-binary-*
          path: binaries

      # Smoke the linux-x64 binary from OUTSIDE any source tree so it must rely on
      # its embedded schemas (validate) and embedded viewer dist (serve) — proof the
      # self-contained native binary works with no npm and no co-located files.
      - name: Native binary smoke (embedded schemas + dist)
        shell: bash
        run: |
          set -euo pipefail
          bin="$(mktemp -d)/architext"
          cp binaries/architext-binary-linux-x64/architext "$bin"
          chmod +x "$bin"
          target="$(mktemp -d)"
          "$bin" --version
          "$bin" sync "$target" --yes --branch none
          "$bin" validate "$target"

      # Attach the native binaries + a SHA256SUMS manifest to the GitHub release so
      # the shell installer and `architext update` can download them directly.
      - name: Attach native binaries + checksums to the release
        if: ${{ needs.resolve.outputs.dry_run == 'false' && github.event_name == 'release' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          for key in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            cp "binaries/architext-binary-$key/architext" "release-assets/architext-$key"
          done
          cp "binaries/architext-binary-win32-x64/architext.exe" "release-assets/architext-win32-x64.exe"
          ( cd release-assets && sha256sum architext-* > SHA256SUMS )
          gh release upload "${{ needs.resolve.outputs.tag }}" release-assets/* --clobber --repo "${{ github.repository }}"

      # Notify the roboticus-site repo so it re-syncs Architext's release data.
      # The built-in GITHUB_TOKEN is scoped to this repo and cannot dispatch
      # cross-repo, so this uses a maintainer-provided PAT with dispatch rights on
      # roboticus-site. Skips gracefully (does not fail the release) if unset.
      - name: Notify roboticus-site of the release
        if: ${{ needs.resolve.outputs.dry_run == 'false' && github.event_name == 'release' }}
        env:
          DISPATCH_TOKEN: ${{ secrets.ROBOTICUS_SITE_DISPATCH_TOKEN }}
          VERSION: ${{ needs.resolve.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DISPATCH_TOKEN:-}" ]; then
            echo "ROBOTICUS_SITE_DISPATCH_TOKEN not set; skipping roboticus-site notification." >&2
            exit 0
          fi
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/robot-accomplice/roboticus-site/dispatches \
            -d "{\"event_type\":\"architext-release\",\"client_payload\":{\"version\":\"${VERSION}\"}}"
          echo "Dispatched architext-release (${VERSION}) to roboticus-site."
