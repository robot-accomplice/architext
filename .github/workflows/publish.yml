name: Publish to npm

# Rust-only publish (1.7.0+). Cross-compiles the five native binaries, then on a
# single runner builds the viewer dist, stamps the per-platform packages, and
# publishes the binary packages FIRST and the launcher (main package) LAST — so
# the launcher's optionalDependencies already exist when anyone installs it.
# There is no JS fallback after the cutover, so a partial publish (launcher
# without binaries) would break every install; the binary matrix uses
# fail-fast and the launcher publishes only after all five succeed.
#
# dry_run=true validates the whole flow (build + stamp + gate + `npm publish
# --dry-run`) without pushing anything or needing OIDC — run it before tagging.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish, without the leading v.
        required: false
        type: string
      dry_run:
        description: Validate the flow without pushing any package.
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write # attach native binaries + checksums to the GitHub release
  id-token: write

jobs:
  resolve:
    name: resolve version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.r.outputs.tag }}
      version: ${{ steps.r.outputs.version }}
      dry_run: ${{ steps.r.outputs.dry_run }}
      ref: ${{ steps.r.outputs.ref }}
    steps:
      - name: Resolve tag / version / ref
        id: r
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
            dry_run="false"
            ref="$tag"
          else
            tag="v${{ inputs.version }}"
            dry_run="${{ inputs.dry_run }}"
            ref="${{ github.ref }}"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must be vX.Y.Z; got $tag" >&2
            exit 1
          fi
          {
            echo "tag=$tag"
            echo "version=${tag#v}"
            echo "dry_run=$dry_run"
            echo "ref=$ref"
          } >> "$GITHUB_OUTPUT"

  build-binaries:
    name: binary ${{ matrix.target_key }}
    needs: resolve
    runs-on: ${{ matrix.runner }}
    # Publish nothing unless ALL five binaries build — a partial set would break
    # installs (no JS fallback).
    strategy:
      fail-fast: true
      matrix:
        include:
          - target_key: darwin-arm64
            runner: macos-14
            rust_target: aarch64-apple-darwin
            cross: false
            bin: architext
          - target_key: darwin-x64
            runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            cross: false
            bin: architext
          - target_key: linux-x64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            cross: false
            bin: architext
          - target_key: linux-arm64
            runner: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            cross: true
            bin: architext
          - target_key: win32-x64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            cross: false
            bin: architext.exe

    steps:
      - name: Check out the release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install cross
        if: ${{ matrix.cross }}
        run: cargo install cross --locked

      - name: Build native CLI (cargo)
        if: ${{ !matrix.cross }}
        run: cargo build --release -p architext-cli --target ${{ matrix.rust_target }}

      - name: Build native CLI (cross)
        if: ${{ matrix.cross }}
        run: cross build --release -p architext-cli --target ${{ matrix.rust_target }}

      - name: Stage binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p staged
          cp "target/${{ matrix.rust_target }}/release/${{ matrix.bin }}" "staged/${{ matrix.bin }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v5
        with:
          name: architext-binary-${{ matrix.target_key }}
          path: staged/${{ matrix.bin }}
          if-no-files-found: error

  publish:
    name: stamp + publish
    needs: [resolve, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Check out the release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.ref }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install Rust toolchain (viewer dist + native validator)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Confirm package.json matches the released version
        shell: bash
        run: |
          set -euo pipefail
          actual="$(node -p 'require("./package.json").version')"
          if [ "$actual" != "${{ needs.resolve.outputs.version }}" ]; then
            echo "package.json version ($actual) != released version (${{ needs.resolve.outputs.version }})" >&2
            exit 1
          fi

      - name: Build the viewer dist
        run: npm run build:viewer

      - name: Download per-platform binaries
        uses: actions/download-artifact@v5
        with:
          pattern: architext-binary-*
          path: binaries

      - name: Stamp the per-platform packages (binary + co-located dist)
        shell: bash
        run: |
          set -euo pipefail
          for key in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64; do
            bin="architext"
            [ "$key" = "win32-x64" ] && bin="architext.exe"
            node scripts/build-binary-packages.mjs \
              --binary "binaries/architext-binary-$key/$bin" \
              --target "$key" \
              --out dist-binaries
          done

      - name: Release gate (validate + package-shape smoke)
        run: npm run release:check

      - name: Publish (binaries first, launcher last)
        shell: bash
        env:
          DRY: ${{ needs.resolve.outputs.dry_run }}
          VERSION: ${{ needs.resolve.outputs.version }}
          # Auth precedence: a granular NPM_TOKEN secret is the reliable path for
          # the first publish of the five brand-new package names. If the secret
          # is unset this is empty and we fall back to OIDC trusted publishing
          # (which needs a trusted publisher configured per package).
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          flags="--access public"
          if [ "$DRY" = "true" ]; then
            flags="$flags --dry-run"
          else
            flags="$flags --provenance"
          fi
          # When no NPM_TOKEN is provided, strip the empty `_authToken` line that
          # setup-node wrote so it doesn't shadow OIDC trusted publishing with a
          # failed empty-token auth. With a token present, leave it in place.
          if [ -z "${NODE_AUTH_TOKEN:-}" ] && [ -n "${NPM_CONFIG_USERCONFIG:-}" ]; then
            sed -i '/:_authToken=/d' "$NPM_CONFIG_USERCONFIG" 2>/dev/null || true
          fi

          # Idempotent, re-runnable publish: a real publish (dry_run=false) skips
          # any package whose exact version is already on the registry, and treats
          # a publish that fails *because the version now exists* as success. So if
          # a run dies partway through the six packages, simply re-running it
          # completes the set instead of 403-ing on the ones already up. Dry-runs
          # always pack every package (never skip) so the validation is complete.
          publish_one() {
            local name="$1" workdir="$2"
            if [ "$DRY" != "true" ] && npm view "$name@$VERSION" version >/dev/null 2>&1; then
              echo "  already published: $name@$VERSION — skipping"
              return 0
            fi
            if ( cd "$workdir" && npm publish $flags ); then
              return 0
            fi
            # Tolerate a race: the version may have landed between the check above
            # and this publish (e.g. a retried network call).
            if [ "$DRY" != "true" ] && npm view "$name@$VERSION" version >/dev/null 2>&1; then
              echo "  $name@$VERSION is now on the registry — treating as published"
              return 0
            fi
            echo "::error::publish failed for $name@$VERSION" >&2
            return 1
          }

          # Binary packages FIRST so the launcher's optionalDependencies resolve.
          for key in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64; do
            echo "::group::publish @robotaccomplice/architext-$key"
            publish_one "@robotaccomplice/architext-$key" "dist-binaries/$key"
            echo "::endgroup::"
          done
          # Launcher (main package) LAST.
          echo "::group::publish @robotaccomplice/architext"
          publish_one "@robotaccomplice/architext" "."
          echo "::endgroup::"

      # Attach the native binaries + a SHA256SUMS manifest to the GitHub release
      # so the shell installer and `architext update` can download them directly.
      # This is the off-npm path: npm is only a transition bridge.
      - name: Attach native binaries + checksums to the release
        if: ${{ needs.resolve.outputs.dry_run == 'false' && github.event_name == 'release' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          for key in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            cp "binaries/architext-binary-$key/architext" "release-assets/architext-$key"
          done
          cp "binaries/architext-binary-win32-x64/architext.exe" "release-assets/architext-win32-x64.exe"
          ( cd release-assets && sha256sum architext-* > SHA256SUMS )
          gh release upload "${{ needs.resolve.outputs.tag }}" release-assets/* --clobber --repo "${{ github.repository }}"

      # Notify the roboticus-site repo so it re-syncs Architext's release data.
      # The built-in GITHUB_TOKEN is scoped to this repo and cannot dispatch
      # cross-repo, so this uses a maintainer-provided PAT with dispatch rights on
      # roboticus-site. Skips gracefully (does not fail the release) if unset.
      - name: Notify roboticus-site of the release
        if: ${{ needs.resolve.outputs.dry_run == 'false' && github.event_name == 'release' }}
        env:
          DISPATCH_TOKEN: ${{ secrets.ROBOTICUS_SITE_DISPATCH_TOKEN }}
          VERSION: ${{ needs.resolve.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DISPATCH_TOKEN:-}" ]; then
            echo "ROBOTICUS_SITE_DISPATCH_TOKEN not set; skipping roboticus-site notification." >&2
            exit 0
          fi
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/robot-accomplice/roboticus-site/dispatches \
            -d "{\"event_type\":\"architext-release\",\"client_payload\":{\"version\":\"${VERSION}\"}}"
          echo "Dispatched architext-release (${VERSION}) to roboticus-site."

      - name: Smoke-test the published native CLI
        if: ${{ needs.resolve.outputs.dry_run == 'false' }}
        shell: bash
        run: |
          set -euo pipefail
          prefix="$(mktemp -d)"
          target="$(mktemp -d)"
          ver="${{ needs.resolve.outputs.version }}"
          # Wait for the just-published version to be visible on the registry read
          # path before installing. A package's tarball lands immediately but its
          # package document propagates with a short delay, so installing right
          # after publish races it and 404s (ETARGET). Poll the launcher AND the
          # binary this runner installs (linux-x64) up to ~5 min. This is a smoke
          # timing guard only — the publish has already succeeded by this point.
          for i in $(seq 1 30); do
            if npm view "@robotaccomplice/architext@$ver" version >/dev/null 2>&1 \
               && npm view "@robotaccomplice/architext-linux-x64@$ver" version >/dev/null 2>&1; then
              break
            fi
            echo "waiting for npm to surface $ver ($i/30)..."
            sleep 10
          done
          npm install -g --prefix "$prefix" "@robotaccomplice/architext@$ver"
          "$prefix/bin/architext" --version
          "$prefix/bin/architext" sync "$target" --yes --branch none
          "$prefix/bin/architext" validate "$target"
