name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/architext/package-lock.json

      - name: Install package dependencies
        run: npm ci

      - name: Install viewer workspace dependencies
        run: npm ci --prefix docs/architext

      - name: Run CLI tests
        run: npm test

      - name: Run routing and C4 fitness tests
        run: npm run test:benchmark

      - name: Validate Architext data
        run: npm run validate

      - name: Build package-owned viewer
        run: npm run build

      - name: Install browser dependencies
        run: npx playwright install --with-deps chromium

      - name: Run automated UAT harness
        run: npm run test:uat

      - name: Check package contents
        run: npm pack --dry-run

      - name: Smoke test packed global CLI
        run: npm run smoke:pack
