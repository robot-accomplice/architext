name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  verify-rust:
    name: verify-rust
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Run Rust workspace tests
        run: cargo test --workspace

      # Native routing fitness + perf ratchet over the in-repo corpus — the
      # routing-quality regression gate (replaces the retired JS fitness suite).
      - name: Routing corpus fitness + perf ratchet
        run: cargo test -p architext-routing --test corpus_fitness

      - name: Lint wasm viewer with clippy
        run: cargo clippy -p architext-viewer --target wasm32-unknown-unknown -- -D warnings

      - name: Build Leptos viewer with trunk
        run: trunk build --release --config crates/architext-viewer/Trunk.toml

      - name: Validate Architext data with the native validator
        run: cargo run --quiet -p architext-cli -- validate .

      - name: Rust serve end-to-end smoke
        run: bash scripts/rust-serve-smoke.sh

  package:
    name: package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain (for the Trunk viewer build)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Set up Node (launcher + tooling are thin Node shims)
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Check install docs
        run: npm run check:install-docs

      - name: Build the viewer dist for the package
        run: npm run build:viewer

      - name: Check package contents
        run: npm pack --dry-run

      - name: Package-shape smoke (Rust-only contents)
        run: npm run smoke:pack
