name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/architext/package-lock.json

      - name: Install package dependencies
        run: npm ci

      - name: Install viewer workspace dependencies
        run: npm ci --prefix docs/architext

      - name: Run CLI tests
        run: npm test

      - name: Run routing and C4 fitness tests
        run: npm run test:benchmark

      - name: Validate Architext data
        run: npm run validate

      - name: Build package-owned viewer
        run: npm run build

      - name: Check package contents
        run: npm pack --dry-run

      - name: Smoke test packed global CLI
        shell: bash
        run: |
          set -euo pipefail
          npm pack --json --silent | sed -n '/^\[/,$p' > /tmp/architext-pack.json
          package_file="$(node -e 'const fs = require("node:fs"); const pack = JSON.parse(fs.readFileSync("/tmp/architext-pack.json", "utf8")); console.log(pack[0].filename);')"
          prefix="$(mktemp -d)"
          target="$(mktemp -d)"
          npm install -g --prefix "$prefix" "./$package_file"
          "$prefix/bin/architext" --version
          "$prefix/bin/architext" sync "$target" --yes --branch none
          "$prefix/bin/architext" doctor "$target" --dry-run
          "$prefix/bin/architext" validate "$target"
